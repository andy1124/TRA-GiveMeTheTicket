<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRA-GiveMeTheTicket</title>
  <style>
    /* ── Reset & Variables ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #242736;
      --border:    #2e3245;
      --accent:    #4f8cff;
      --accent-h:  #6ea3ff;
      --green:     #3ecf8e;
      --yellow:    #f5a623;
      --red:       #f26464;
      --text:      #e2e6f0;
      --text-dim:  #7a8099;
      --radius:    8px;
      --font:      'Segoe UI', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Layout ────────────────────────────────────────────────── */
    .app { display: flex; flex-direction: column; height: 100vh; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .logo { font-size: 16px; font-weight: 700; letter-spacing: .5px; color: var(--accent); flex-shrink: 0; }

    .status-badge {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 14px;
      font-size: 13px; font-weight: 500;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-dim);
      transition: background .3s;
    }
    .status-dot.idle    { background: var(--text-dim); }
    .status-dot.running { background: var(--yellow); animation: pulse 1s infinite; }
    .status-dot.success { background: var(--green); }
    .status-dot.failed  { background: var(--red); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .header-actions { margin-left: auto; display: flex; gap: 8px; }

    /* ── Buttons ───────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 18px; border-radius: var(--radius);
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: none; transition: all .15s; white-space: nowrap;
    }
    .btn-primary  { background: var(--accent);   color: #fff; }
    .btn-primary:hover  { background: var(--accent-h); }
    .btn-danger   { background: var(--red);       color: #fff; }
    .btn-danger:hover   { opacity: .85; }
    .btn-ghost    { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
    .btn-ghost:hover    { color: var(--text); border-color: var(--accent); }
    .btn:disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }

    /* ── Main Content ──────────────────────────────────────────── */
    .main {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
      flex: 1;
      overflow: hidden;
    }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px 20px 24px;
    }

    .log-panel {
      display: flex; flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    /* ── Section ───────────────────────────────────────────────── */
    .section { margin-bottom: 24px; }

    .section-title {
      font-size: 11px; font-weight: 700; letter-spacing: .8px;
      color: var(--text-dim); text-transform: uppercase;
      margin-bottom: 12px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Form ──────────────────────────────────────────────────── */
    .form-row { margin-bottom: 12px; }
    .form-row label {
      display: block; font-size: 12px; color: var(--text-dim);
      margin-bottom: 4px; font-weight: 500;
    }

    input[type=text], input[type=password], input[type=number],
    input[type=date], select {
      width: 100%; padding: 7px 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-size: 13px; font-family: inherit;
      transition: border-color .15s;
    }
    input:focus, select:focus {
      outline: none; border-color: var(--accent);
    }
    select option { background: var(--surface2); }

    /* Date picker icon – lighten on dark background */
    input[type=date]::-webkit-calendar-picker-indicator {
      filter: invert(0.55) brightness(1.8);
      opacity: 0.55;
      cursor: pointer;
      transition: opacity .15s;
    }
    input[type=date]::-webkit-calendar-picker-indicator:hover { opacity: 1; }

    /* Hide native number spinners */
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

    /* Custom number wrapper */
    .num-wrapper {
      display: flex; align-items: stretch;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface2);
      transition: border-color .15s;
    }
    .num-wrapper:focus-within { border-color: var(--accent); }
    .num-wrapper input[type=number] {
      border: none !important; border-radius: 0;
      text-align: center; flex: 1; min-width: 0;
    }
    .num-wrapper input[type=number]:focus { outline: none; }
    .num-btn {
      width: 30px; background: transparent; border: none;
      color: var(--text-dim); font-size: 15px; line-height: 1;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s, color .12s;
      user-select: none;
    }
    .num-btn-dec { border-right: 1px solid var(--border); }
    .num-btn-inc { border-left:  1px solid var(--border); }
    .num-btn:hover  { background: rgba(79,140,255,.12); color: var(--accent); }
    .num-btn:active { background: rgba(79,140,255,.22); }

    /* Radio group */
    .radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .radio-group label {
      display: flex; align-items: center; gap: 5px;
      cursor: pointer; font-size: 12px; color: var(--text);
      background: var(--surface2); border: 1px solid var(--border);
      padding: 5px 10px; border-radius: 6px; transition: all .15s;
      margin-bottom: 0;
    }
    .radio-group input[type=radio] { accent-color: var(--accent); }
    .radio-group label:has(input:checked) {
      border-color: var(--accent); color: var(--accent);
      background: rgba(79,140,255,.1);
    }

    /* Toggle */
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .toggle-row .label-text { font-size: 13px; color: var(--text); }
    .toggle-row .label-sub  { font-size: 11px; color: var(--text-dim); }

    .toggle {
      position: relative; width: 40px; height: 22px; flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0; cursor: pointer;
      background: var(--border); border-radius: 22px;
      transition: background .2s;
    }
    .toggle-slider::before {
      content: ''; position: absolute;
      height: 16px; width: 16px; left: 3px; bottom: 3px;
      background: #fff; border-radius: 50%;
      transition: transform .2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

    /* Save button area */
    .save-area {
      padding: 12px 0 0;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }
    .save-area .btn { width: 100%; justify-content: center; }

    /* ── Log Panel ─────────────────────────────────────────────── */
    .log-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .log-header-title { font-size: 12px; font-weight: 700; color: var(--text-dim); letter-spacing: .5px; }
    .log-header-actions { margin-left: auto; display: flex; gap: 6px; }

    .ws-indicator {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--red); transition: background .3s;
    }
    .ws-indicator.connected { background: var(--green); }

    #log-output {
      flex: 1; overflow-y: auto; padding: 10px 16px;
      font-family: 'Consolas', 'Cascadia Code', monospace; font-size: 12px;
      line-height: 1.7;
    }

    .log-line { display: flex; gap: 10px; }
    .log-line .ts { color: var(--text-dim); flex-shrink: 0; }
    .log-line .lv { flex-shrink: 0; width: 38px; text-align: center;
                    border-radius: 3px; font-size: 10px; font-weight: 700;
                    padding: 1px 0; }
    .log-line .msg { white-space: pre-wrap; word-break: break-all; }

    .log-line.INFO  .lv { background: rgba(79,140,255,.2); color: var(--accent); }
    .log-line.WARN, .log-line.WARNING { }
    .log-line.WARN  .lv,
    .log-line.WARNING .lv { background: rgba(245,166,35,.2); color: var(--yellow); }
    .log-line.ERROR .lv { background: rgba(242,100,100,.2); color: var(--red); }
    .log-line.DEBUG .lv { background: rgba(122,128,153,.15); color: var(--text-dim); }

    .log-success-banner {
      margin: 8px 0; padding: 10px 14px;
      background: rgba(62,207,142,.15); border: 1px solid rgba(62,207,142,.4);
      border-radius: var(--radius); color: var(--green);
      font-weight: 600; font-size: 13px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Toast ─────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 10px 18px; border-radius: var(--radius);
      font-size: 13px; font-weight: 500;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); opacity: 0; pointer-events: none;
      transform: translateY(8px);
      transition: opacity .25s, transform .25s;
      z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok   { border-color: var(--green); color: var(--green); }
    #toast.err  { border-color: var(--red);   color: var(--red); }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Header ── -->
  <header>
    <span class="logo">🚂 TRA-GiveMeTheTicket</span>
    <div class="status-badge">
      <div class="status-dot idle" id="status-dot"></div>
      <span id="status-text">閒置</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" id="btn-start" onclick="startBooking()">▶ 開始搶票</button>
      <button class="btn btn-danger"  id="btn-stop"  onclick="stopBooking()" disabled>⏹ 停止</button>
    </div>
  </header>

  <!-- ── Main ── -->
  <div class="main">

    <!-- 左側：設定表單 -->
    <div class="sidebar">

      <!-- 訂票設定 -->
      <div class="section">
        <div class="section-title">訂票設定</div>

        <div class="form-row">
          <label>身分證字號</label>
          <input type="password" id="id_number" placeholder="A123456789" autocomplete="off" />
        </div>

        <div class="form-row">
          <label>出發站</label>
          <select id="departure_station">
            <option value="">— 請選擇 —</option>
          </select>
        </div>

        <div class="form-row">
          <label>抵達站</label>
          <select id="arrival_station">
            <option value="">— 請選擇 —</option>
          </select>
        </div>

        <div class="form-row">
          <label>乘車日期</label>
          <input type="date" id="date" />
        </div>

        <div class="form-row">
          <label>車次號碼</label>
          <input type="text" id="train_number" placeholder="例：283" />
        </div>

        <div class="form-row">
          <label>票數（1-10）</label>
          <div class="num-wrapper">
            <button class="num-btn num-btn-dec" type="button" onclick="stepNum('ticket_count',-1)">−</button>
            <input type="number" id="ticket_count" min="1" max="10" value="1" />
            <button class="num-btn num-btn-inc" type="button" onclick="stepNum('ticket_count', 1)">+</button>
          </div>
        </div>

        <div class="form-row">
          <label>座位偏好</label>
          <div class="radio-group" id="seat_preference">
            <label><input type="radio" name="seat_pref" value="none" checked />不指定</label>
            <label><input type="radio" name="seat_pref" value="window" />靠窗</label>
            <label><input type="radio" name="seat_pref" value="aisle" />靠走道</label>
            <label><input type="radio" name="seat_pref" value="table" />桌型座</label>
          </div>
        </div>

        <div class="toggle-row">
          <div>
            <div class="label-text">接受換座</div>
            <div class="label-sub">接受同班車不同座位</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="accept_seat_exchange" checked />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <!-- 自動化設定（僅顯示 retry_interval，Phase 2 完整展開） -->
      <div class="section">
        <div class="section-title">自動化設定</div>

        <div class="form-row">
          <label>重試間隔（秒）</label>
          <div class="num-wrapper">
            <button class="num-btn num-btn-dec" type="button" onclick="stepNum('retry_interval',-1)">−</button>
            <input type="number" id="retry_interval" min="1" max="30" value="2" />
            <button class="num-btn num-btn-inc" type="button" onclick="stepNum('retry_interval', 1)">+</button>
          </div>
        </div>

        <div class="form-row">
          <label>最大重試次數</label>
          <div class="num-wrapper">
            <button class="num-btn num-btn-dec" type="button" onclick="stepNum('max_retries',-100)">−</button>
            <input type="number" id="max_retries" min="1" max="9999" value="1000" />
            <button class="num-btn num-btn-inc" type="button" onclick="stepNum('max_retries', 100)">+</button>
          </div>
        </div>

        <div class="form-row">
          <label>操作延遲 slow_mo（ms）</label>
          <div class="num-wrapper">
            <button class="num-btn num-btn-dec" type="button" onclick="stepNum('slow_mo',-10)">−</button>
            <input type="number" id="slow_mo" min="0" max="1000" value="100" />
            <button class="num-btn num-btn-inc" type="button" onclick="stepNum('slow_mo', 10)">+</button>
          </div>
        </div>

        <div class="toggle-row">
          <div>
            <div class="label-text">使用真實 Chrome</div>
            <div class="label-sub">強烈建議開啟，降低 reCAPTCHA</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="use_real_chrome" checked />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <!-- 儲存按鈕 -->
      <div class="save-area">
        <button class="btn btn-ghost" onclick="saveConfig()">💾 儲存設定到 config.yaml</button>
      </div>
    </div>

    <!-- 右側：Log 面板 -->
    <div class="log-panel">
      <div class="log-header">
        <div class="ws-indicator" id="ws-dot"></div>
        <span class="log-header-title">即時 LOG</span>
        <div class="log-header-actions">
          <button class="btn btn-ghost" onclick="copyLog()" style="padding:4px 10px;font-size:11px;">複製</button>
          <button class="btn btn-ghost" onclick="clearLog()" style="padding:4px 10px;font-size:11px;">清空</button>
        </div>
      </div>
      <div id="log-output"></div>
    </div>

  </div><!-- .main -->
</div><!-- .app -->

<div id="toast"></div>

<script>
// ── 常用台鐵站名 ──────────────────────────────────────────────────────
const STATIONS = [
  '基隆','臺北','板橋','桃園','中壢','楊梅','新竹','竹南','苗栗','豐富',
  '臺中','彰化','員林','田中','二水','斗六','斗南','嘉義','水上','後壁',
  '新營','臺南','永康','保安','新市','善化','新化','關廟','新左營',
  '高雄','鳳山','屏東','南州','枋寮','花蓮','光復','玉里','臺東',
  '宜蘭','羅東','蘇澳','蘇澳新',
];

function fillStations() {
  ['departure_station','arrival_station'].forEach(id => {
    const sel = document.getElementById(id);
    const firstOpt = sel.options[0];
    sel.innerHTML = '';
    sel.appendChild(firstOpt);
    STATIONS.forEach(s => {
      const o = document.createElement('option');
      o.value = o.textContent = s;
      sel.appendChild(o);
    });
  });
}

// ── 載入設定 ──────────────────────────────────────────────────────────
async function loadConfig() {
  try {
    const res = await fetch('/api/config');
    if (!res.ok) return;
    const data = await res.json();
    const b = data.booking || {};
    const a = data.automation || {};

    setVal('id_number',          b.id_number    || '');
    setSelect('departure_station', b.departure_station || '');
    setSelect('arrival_station',   b.arrival_station   || '');
    // date: YYYY/MM/DD → YYYY-MM-DD for input[type=date]
    if (b.date) setVal('date', b.date.replace(/\//g, '-'));
    setVal('train_number',       b.train_number || '');
    setVal('ticket_count',       b.ticket_count ?? 1);
    setRadio('seat_pref',        b.seat_preference || 'none');
    setCheck('accept_seat_exchange', b.accept_seat_exchange !== false);

    setVal('retry_interval', a.retry_interval ?? 2);
    setVal('max_retries',    a.max_retries    ?? 1000);
    setVal('slow_mo',        a.slow_mo        ?? 100);
    setCheck('use_real_chrome', a.use_real_chrome !== false);
  } catch(e) {
    console.warn('loadConfig error', e);
  }
}

// ── 儲存設定 ──────────────────────────────────────────────────────────
async function saveConfig() {
  // 驗證
  const idNum = getVal('id_number').trim();
  const dep   = getVal('departure_station');
  const arr   = getVal('arrival_station');
  const date  = getVal('date');
  const train = getVal('train_number').trim();

  if (!idNum)  return showToast('請填寫身分證字號', 'err');
  if (!dep)    return showToast('請選擇出發站', 'err');
  if (!arr)    return showToast('請選擇抵達站', 'err');
  if (dep === arr) return showToast('出發站與抵達站不可相同', 'err');
  if (!date)   return showToast('請選擇乘車日期', 'err');
  if (!train)  return showToast('請填寫車次號碼', 'err');

  const payload = {
    booking: {
      id_number:            idNum,
      departure_station:    dep,
      arrival_station:      arr,
      date:                 date.replace(/-/g, '/'),   // YYYY-MM-DD → YYYY/MM/DD
      train_number:         train,
      ticket_count:         parseInt(getVal('ticket_count')) || 1,
      seat_preference:      getRadio('seat_pref') || 'none',
      accept_seat_exchange: getCheck('accept_seat_exchange'),
    },
    automation: {
      headless:             false,
      retry_interval:       parseFloat(getVal('retry_interval')) || 2,
      max_retries:          parseInt(getVal('max_retries'))       || 1000,
      slow_mo:              parseInt(getVal('slow_mo'))           || 100,
      use_real_chrome:      getCheck('use_real_chrome'),
      chrome_profile_path:  '',
      kill_chrome_on_start: false,
      collect_captcha:      false,
      captcha_dataset_dir:  'captcha_dataset',
    },
  };

  try {
    const res = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (res.ok) {
      showToast('✅ 設定已儲存', 'ok');
    } else {
      const err = await res.json();
      showToast('儲存失敗：' + (err.detail || res.status), 'err');
    }
  } catch(e) {
    showToast('網路錯誤：' + e.message, 'err');
  }
}

// ── 開始 / 停止 ───────────────────────────────────────────────────────
async function startBooking() {
  // 先儲存設定
  await saveConfig();

  try {
    const res = await fetch('/api/start', { method: 'POST' });
    if (res.ok) {
      setRunningUI(true);
      showToast('▶ 搶票已啟動', 'ok');
    } else {
      const err = await res.json();
      showToast('啟動失敗：' + (err.detail || res.status), 'err');
    }
  } catch(e) {
    showToast('網路錯誤：' + e.message, 'err');
  }
}

async function stopBooking() {
  try {
    await fetch('/api/stop', { method: 'POST' });
    setRunningUI(false);
    showToast('⏹ 已停止', 'ok');
  } catch(e) {
    showToast('停止失敗：' + e.message, 'err');
  }
}

function setRunningUI(running) {
  document.getElementById('btn-start').disabled = running;
  document.getElementById('btn-stop').disabled  = !running;
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  if (running) {
    dot.className  = 'status-dot running';
    text.textContent = '執行中';
  } else {
    dot.className  = 'status-dot idle';
    text.textContent = '閒置';
  }
}

// 輪詢狀態（每 2 秒）
async function pollStatus() {
  try {
    const res = await fetch('/api/status');
    if (!res.ok) return;
    const { state } = await res.json();
    const dot  = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    const startBtn = document.getElementById('btn-start');
    const stopBtn  = document.getElementById('btn-stop');

    dot.className = 'status-dot ' + state;
    const labels = { idle:'閒置', running:'執行中', success:'搶票成功 🎉', failed:'失敗' };
    text.textContent = labels[state] || state;

    startBtn.disabled = (state === 'running');
    stopBtn.disabled  = (state !== 'running');
  } catch(e) {}
}
setInterval(pollStatus, 2000);

// ── WebSocket Log ─────────────────────────────────────────────────────
let ws = null;
let autoScroll = true;

function connectWS() {
  const wsUrl = `ws://${location.host}/ws/logs`;
  ws = new WebSocket(wsUrl);
  const dot = document.getElementById('ws-dot');

  ws.onopen  = () => { dot.className = 'ws-indicator connected'; };
  ws.onclose = () => {
    dot.className = 'ws-indicator';
    setTimeout(connectWS, 3000);   // 自動重連
  };
  ws.onerror = () => ws.close();

  ws.onmessage = (evt) => {
    appendLog(evt.data);
    // 保持心跳（防止某些 proxy 切斷）
    if (ws.readyState === WebSocket.OPEN) ws.send('ping');
  };
}

function appendLog(raw) {
  const out = document.getElementById('log-output');

  // 成功偵測
  if (raw.includes('搶票成功') || raw.includes('🎉')) {
    const banner = document.createElement('div');
    banner.className = 'log-success-banner';
    banner.textContent = '🎉 搶票成功！';
    out.appendChild(banner);
  }

  // 解析格式：HH:MM:SS [LEVEL] message
  const match = raw.match(/^(\d{2}:\d{2}:\d{2})\s+\[(\w+)\]\s+([\s\S]*)$/);
  const line = document.createElement('div');
  if (match) {
    const [, ts, lv, msg] = match;
    line.className = `log-line ${lv}`;
    line.innerHTML =
      `<span class="ts">${ts}</span>` +
      `<span class="lv">${lv}</span>` +
      `<span class="msg">${escHtml(msg)}</span>`;
  } else {
    line.className = 'log-line INFO';
    line.innerHTML = `<span class="msg">${escHtml(raw)}</span>`;
  }
  out.appendChild(line);

  // 超過 500 行就移除最舊的
  while (out.children.length > 500) out.removeChild(out.firstChild);

  // 自動捲動到底部
  if (autoScroll) out.scrollTop = out.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 捲動偵測：使用者往上捲就停止自動捲動
document.addEventListener('DOMContentLoaded', () => {
  const out = document.getElementById('log-output');
  out.addEventListener('scroll', () => {
    autoScroll = (out.scrollHeight - out.scrollTop - out.clientHeight) < 40;
  });
});

function clearLog() {
  document.getElementById('log-output').innerHTML = '';
}

function copyLog() {
  const lines = [...document.getElementById('log-output').querySelectorAll('.log-line')];
  const text  = lines.map(l => l.textContent.trim()).join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('Log 已複製', 'ok'));
}

// ── Toast ─────────────────────────────────────────────────────────────
let _toastTimer = null;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, 2500);
}

// ── Custom number step ────────────────────────────────────────────────
function stepNum(id, delta) {
  const el = document.getElementById(id);
  if (!el) return;
  const min = el.min !== '' ? parseFloat(el.min) : -Infinity;
  const max = el.max !== '' ? parseFloat(el.max) :  Infinity;
  const cur = parseFloat(el.value) || 0;
  el.value = Math.min(max, Math.max(min, cur + delta));
}

// ── Helpers ───────────────────────────────────────────────────────────
const getVal    = id => document.getElementById(id)?.value ?? '';
const setVal    = (id, v) => { const el = document.getElementById(id); if (el) el.value = v; };
const getCheck  = id => document.getElementById(id)?.checked ?? false;
const setCheck  = (id, v) => { const el = document.getElementById(id); if (el) el.checked = v; };
const getRadio  = name => document.querySelector(`input[name="${name}"]:checked`)?.value ?? '';
const setRadio  = (name, v) => {
  const el = document.querySelector(`input[name="${name}"][value="${v}"]`);
  if (el) el.checked = true;
};
const setSelect = (id, v) => {
  const sel = document.getElementById(id);
  if (!sel) return;
  for (const o of sel.options) if (o.value === v) { sel.value = v; return; }
};

// ── 初始化 ────────────────────────────────────────────────────────────
fillStations();
loadConfig();
connectWS();
