<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRA-GiveMeTheTicket</title>
  <style>
    /* ── Reset & Variables ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #242736;
      --border:    #2e3245;
      --accent:    #4f8cff;
      --accent-h:  #6ea3ff;
      --green:     #3ecf8e;
      --yellow:    #f5a623;
      --red:       #f26464;
      --text:      #e2e6f0;
      --text-dim:  #7a8099;
      --radius:    8px;
      --font:      'Segoe UI', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Layout ────────────────────────────────────────────────── */
    .app { display: flex; flex-direction: column; height: 100vh; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .logo { font-size: 16px; font-weight: 700; letter-spacing: .5px; color: var(--accent); flex-shrink: 0; }

    .status-badge {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 14px;
      font-size: 13px; font-weight: 500;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-dim);
      transition: background .3s;
      flex-shrink: 0;
    }
    .status-dot.idle    { background: var(--text-dim); }
    .status-dot.waiting { background: var(--yellow); animation: pulse 2s infinite; }
    .status-dot.running { background: var(--yellow); animation: pulse 1s infinite; }
    .status-dot.success { background: var(--green); }
    .status-dot.failed  { background: var(--red); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .status-info { display: flex; flex-direction: column; gap: 3px; }

    #job-results-strip {
      display: none; gap: 3px; flex-wrap: wrap;
      font-size: 13px; line-height: 1;
    }

    .header-actions { margin-left: auto; display: flex; gap: 8px; }

    /* ── Buttons ───────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 18px; border-radius: var(--radius);
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: none; transition: all .15s; white-space: nowrap;
    }
    .btn-primary  { background: var(--accent);   color: #fff; }
    .btn-primary:hover  { background: var(--accent-h); }
    .btn-danger   { background: var(--red);       color: #fff; }
    .btn-danger:hover   { opacity: .85; }
    .btn-ghost    { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
    .btn-ghost:hover    { color: var(--text); border-color: var(--accent); }
    .btn:disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }

    /* ── Main Content ──────────────────────────────────────────── */
    .main {
      display: grid;
      grid-template-columns: 390px 1fr;
      gap: 0;
      flex: 1;
      overflow: hidden;
    }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px 20px 24px;
    }

    .log-panel {
      display: flex; flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    /* ── Section ───────────────────────────────────────────────── */
    .section { margin-bottom: 24px; }

    .section-title {
      font-size: 11px; font-weight: 700; letter-spacing: .8px;
      color: var(--text-dim); text-transform: uppercase;
      margin-bottom: 12px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Form ──────────────────────────────────────────────────── */
    .form-row { margin-bottom: 12px; }
    .form-row label {
      display: block; font-size: 12px; color: var(--text-dim);
      margin-bottom: 4px; font-weight: 500;
    }

    input[type=text], input[type=password], input[type=number],
    input[type=date], input[type=datetime-local], select {
      width: 100%; padding: 7px 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-size: 13px; font-family: inherit;
      transition: border-color .15s;
    }
    input:focus, select:focus {
      outline: none; border-color: var(--accent);
    }
    select option { background: var(--surface2); }

    input[type=date]::-webkit-calendar-picker-indicator,
    input[type=datetime-local]::-webkit-calendar-picker-indicator {
      filter: invert(0.55) brightness(1.8);
      opacity: 0.55; cursor: pointer; transition: opacity .15s;
    }
    input[type=date]::-webkit-calendar-picker-indicator:hover,
    input[type=datetime-local]::-webkit-calendar-picker-indicator:hover { opacity: 1; }

    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

    .num-wrapper {
      display: flex; align-items: stretch;
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; background: var(--surface2); transition: border-color .15s;
    }
    .num-wrapper:focus-within { border-color: var(--accent); }
    .num-wrapper input[type=number] {
      border: none !important; border-radius: 0;
      text-align: center; flex: 1; min-width: 0;
    }
    .num-wrapper input[type=number]:focus { outline: none; }
    .num-btn {
      width: 30px; background: transparent; border: none;
      color: var(--text-dim); font-size: 15px; line-height: 1;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s, color .12s; user-select: none;
    }
    .num-btn-dec { border-right: 1px solid var(--border); }
    .num-btn-inc { border-left:  1px solid var(--border); }
    .num-btn:hover  { background: rgba(79,140,255,.12); color: var(--accent); }
    .num-btn:active { background: rgba(79,140,255,.22); }

    .radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .radio-group label {
      display: flex; align-items: center; gap: 5px;
      cursor: pointer; font-size: 12px; color: var(--text);
      background: var(--surface2); border: 1px solid var(--border);
      padding: 5px 10px; border-radius: 6px; transition: all .15s;
      margin-bottom: 0;
    }
    .radio-group input[type=radio] { accent-color: var(--accent); }
    .radio-group label:has(input:checked) {
      border-color: var(--accent); color: var(--accent);
      background: rgba(79,140,255,.1);
    }

    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .toggle-row .label-text { font-size: 13px; color: var(--text); }
    .toggle-row .label-sub  { font-size: 11px; color: var(--text-dim); }

    .toggle {
      position: relative; width: 40px; height: 22px; flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0; cursor: pointer;
      background: var(--border); border-radius: 22px; transition: background .2s;
    }
    .toggle-slider::before {
      content: ''; position: absolute;
      height: 16px; width: 16px; left: 3px; bottom: 3px;
      background: #fff; border-radius: 50%; transition: transform .2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

    .save-area {
      padding: 12px 0 0;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }
    .save-area .btn { width: 100%; justify-content: center; }

    /* ── Job Cards ─────────────────────────────────────────────── */
    #job-list { margin-bottom: 10px; }

    .job-card {
      border: 1px solid var(--border); border-radius: var(--radius);
      margin-bottom: 8px; overflow: hidden; transition: border-color .15s;
    }
    .job-card:hover { border-color: #3d4260; }

    .job-card-header {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 10px; background: var(--surface2);
      cursor: pointer; user-select: none; transition: background .12s;
    }
    .job-card-header:hover { background: #2a2f42; }

    .job-num-badge {
      font-size: 11px; font-weight: 700; color: var(--accent);
      background: rgba(79,140,255,.12);
      padding: 2px 7px; border-radius: 4px; flex-shrink: 0;
    }

    .job-card-title {
      font-size: 12px; color: var(--text);
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .job-card-actions { display: flex; gap: 3px; flex-shrink: 0; }

    .job-btn {
      background: transparent; border: 1px solid var(--border);
      border-radius: 4px; color: var(--text-dim);
      font-size: 11px; width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .12s;
    }
    .job-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,140,255,.08); }
    .job-btn:disabled { opacity: .3; cursor: not-allowed; pointer-events: none; }
    .job-btn-del:hover { border-color: var(--red); color: var(--red); background: rgba(242,100,100,.08); }

    .job-card-chevron { font-size: 10px; color: var(--text-dim); flex-shrink: 0; }

    .job-card-body {
      padding: 12px 12px 4px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .job-card.collapsed .job-card-body { display: none; }

    .add-job-btn {
      width: 100%; justify-content: center;
      font-size: 12px; padding: 6px;
      border-style: dashed;
    }

    /* ── Log Panel ─────────────────────────────────────────────── */
    .log-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    .log-header-title { font-size: 12px; font-weight: 700; color: var(--text-dim); letter-spacing: .5px; }
    .log-header-actions { margin-left: auto; display: flex; gap: 6px; }

    .ws-indicator {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--red); transition: background .3s;
    }
    .ws-indicator.connected { background: var(--green); }

    #log-output {
      flex: 1; overflow-y: auto; padding: 10px 16px;
      font-family: 'Consolas', 'Cascadia Code', monospace; font-size: 12px;
      line-height: 1.7;
    }

    .log-line { display: flex; gap: 10px; }
    .log-line .ts { color: var(--text-dim); flex-shrink: 0; }
    .log-line .lv { flex-shrink: 0; width: 38px; text-align: center;
                    border-radius: 3px; font-size: 10px; font-weight: 700; padding: 1px 0; }
    .log-line .msg { white-space: pre-wrap; word-break: break-all; }

    .log-line.INFO  .lv { background: rgba(79,140,255,.2); color: var(--accent); }
    .log-line.WARN  .lv,
    .log-line.WARNING .lv { background: rgba(245,166,35,.2); color: var(--yellow); }
    .log-line.ERROR .lv { background: rgba(242,100,100,.2); color: var(--red); }
    .log-line.DEBUG .lv { background: rgba(122,128,153,.15); color: var(--text-dim); }

    .log-success-banner {
      margin: 8px 0; padding: 10px 14px;
      background: rgba(62,207,142,.15); border: 1px solid rgba(62,207,142,.4);
      border-radius: var(--radius); color: var(--green);
      font-weight: 600; font-size: 13px;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Toast ─────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 10px 18px; border-radius: var(--radius);
      font-size: 13px; font-weight: 500;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); opacity: 0; pointer-events: none;
      transform: translateY(8px);
      transition: opacity .25s, transform .25s;
      z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok   { border-color: var(--green); color: var(--green); }
    #toast.err  { border-color: var(--red);   color: var(--red); }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Header ── -->
  <header>
    <span class="logo">🚂 TRA-GiveMeTheTicket</span>
    <div class="status-badge">
      <div class="status-dot idle" id="status-dot"></div>
      <div class="status-info">
        <span id="status-text">閒置</span>
        <div id="job-results-strip"></div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" id="btn-start" onclick="startBooking()">▶ 開始搶票</button>
      <button class="btn btn-danger"  id="btn-stop"  onclick="stopBooking()" disabled>⏹ 停止</button>
    </div>
  </header>

  <!-- ── Main ── -->
  <div class="main">

    <!-- 左側：設定表單 -->
    <div class="sidebar">

      <!-- 搶票任務列表 -->
      <div class="section">
        <div class="section-title">搶票任務列表</div>
        <div id="job-list"></div>
        <button class="btn btn-ghost add-job-btn" onclick="addJob()">＋ 新增任務</button>
      </div>

      <!-- 自動化設定 -->
      <div class="section">
        <div class="section-title">自動化設定</div>

        <div class="form-row">
          <label>任務失敗後</label>
          <select id="on_job_exhaust">
            <option value="skip">略過，繼續下一個任務</option>
            <option value="stop">停止所有任務</option>
          </select>
        </div>

        <div class="form-row">
          <label>重試間隔（秒）</label>
          <div class="num-wrapper">
            <button class="num-btn num-btn-dec" type="button" onclick="stepNum('retry_interval',-1)">−</button>
            <input type="number" id="retry_interval" min="1" max="30" value="2" />
            <button class="num-btn num-btn-inc" type="button" onclick="stepNum('retry_interval', 1)">+</button>
          </div>
        </div>

        <div class="form-row">
          <label>最大重試次數</label>
          <div class="num-wrapper">
            <button class="num-btn num-btn-dec" type="button" onclick="stepNum('max_retries',-100)">−</button>
            <input type="number" id="max_retries" min="1" max="9999" value="1000" />
            <button class="num-btn num-btn-inc" type="button" onclick="stepNum('max_retries', 100)">+</button>
          </div>
        </div>

        <div class="form-row">
          <label>操作延遲 slow_mo（ms）</label>
          <div class="num-wrapper">
            <button class="num-btn num-btn-dec" type="button" onclick="stepNum('slow_mo',-10)">−</button>
            <input type="number" id="slow_mo" min="0" max="1000" value="100" />
            <button class="num-btn num-btn-inc" type="button" onclick="stepNum('slow_mo', 10)">+</button>
          </div>
        </div>

        <div class="toggle-row">
          <div>
            <div class="label-text">使用真實 Chrome</div>
            <div class="label-sub">強烈建議開啟，降低 reCAPTCHA</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="use_real_chrome" checked />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <!-- 排程設定 -->
      <div class="section">
        <div class="section-title">排程設定</div>

        <div class="toggle-row">
          <div>
            <div class="label-text">啟用排程</div>
            <div class="label-sub">到指定時間才自動開始搶票</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="schedule_enabled" onchange="toggleSchedule()" />
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div id="schedule_time_row" class="form-row" style="display:none">
          <label>開始日期時間</label>
          <input type="datetime-local" id="scheduled_time" />
        </div>
      </div>

      <!-- 儲存按鈕 -->
      <div class="save-area">
        <button class="btn btn-ghost" onclick="saveConfig()">💾 儲存設定到 config.yaml</button>
      </div>
    </div>

    <!-- 右側：Log 面板 -->
    <div class="log-panel">
      <div class="log-header">
        <div class="ws-indicator" id="ws-dot"></div>
        <span class="log-header-title">即時 LOG</span>
        <div class="log-header-actions">
          <button class="btn btn-ghost" onclick="copyLog()" style="padding:4px 10px;font-size:11px;">複製</button>
          <button class="btn btn-ghost" onclick="clearLog()" style="padding:4px 10px;font-size:11px;">清空</button>
        </div>
      </div>
      <div id="log-output"></div>
    </div>

  </div><!-- .main -->
</div><!-- .app -->

<div id="toast"></div>

<script>
// ── 站名清單 ─────────────────────────────────────────────────────────
const STATIONS = [
  '基隆','臺北','板橋','桃園','中壢','楊梅','新竹','竹南','苗栗','豐富',
  '臺中','彰化','員林','田中','二水','斗六','斗南','嘉義','水上','後壁',
  '新營','臺南','永康','保安','新市','善化','新化','關廟','新左營',
  '高雄','鳳山','屏東','南州','枋寮','花蓮','光復','玉里','臺東',
  '宜蘭','羅東','蘇澳','蘇澳新',
];

const SEAT_OPTIONS = [
  { value: 'none',   label: '不指定' },
  { value: 'window', label: '靠窗' },
  { value: 'aisle',  label: '靠走道' },
  { value: 'table',  label: '桌型座' },
];

// ── 工具函式 ──────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function dateForInput(d) {
  return d ? String(d).replace(/\//g, '-') : '';
}

const getVal    = id => document.getElementById(id)?.value ?? '';
const setVal    = (id, v) => { const el = document.getElementById(id); if (el) el.value = v; };
const getCheck  = id => document.getElementById(id)?.checked ?? false;
const setCheck  = (id, v) => { const el = document.getElementById(id); if (el) el.checked = v; };
const setSelect = (id, v) => {
  const sel = document.getElementById(id);
  if (!sel) return;
  for (const o of sel.options) if (o.value === v) { sel.value = v; return; }
};

function stepNum(id, delta) {
  const el = document.getElementById(id);
  if (!el) return;
  const min = el.min !== '' ? parseFloat(el.min) : -Infinity;
  const max = el.max !== '' ? parseFloat(el.max) :  Infinity;
  el.value = Math.min(max, Math.max(min, (parseFloat(el.value) || 0) + delta));
}

// ── Job 狀態 ──────────────────────────────────────────────────────────
let jobs = [];

function defaultJob() {
  return {
    label: '', id_number: '', departure_station: '', arrival_station: '',
    date: '', train_number: '', ticket_count: 1,
    seat_preference: 'none', accept_seat_exchange: true,
  };
}

function stationOptions(selected) {
  const opts = STATIONS.map(s =>
    `<option value="${escAttr(s)}"${s === selected ? ' selected' : ''}>${escHtml(s)}</option>`
  ).join('');
  return `<option value="">— 請選擇 —</option>` + opts;
}

function seatRadios(cardIndex, selected) {
  const sel = selected || 'none';
  return SEAT_OPTIONS.map(s =>
    `<label><input type="radio" name="seat_pref_${cardIndex}" value="${escAttr(s.value)}"${s.value === sel ? ' checked' : ''} />${escHtml(s.label)}</label>`
  ).join('');
}

function jobCardTitle(job) {
  const lbl = (job.label || '').trim();
  if (lbl) return lbl;
  const train = job.train_number || '—';
  const id    = job.id_number ? job.id_number.substring(0, 3) + '***' : '—';
  return `Train ${train} — ${id}`;
}

function renderJobCard(job, i, total) {
  const title     = jobCardTitle(job);
  const collapsed = i > 0 ? ' collapsed' : '';
  const chevron   = i > 0 ? '▼' : '▲';
  return `
<div class="job-card${collapsed}" id="job-card-${i}">
  <div class="job-card-header" onclick="toggleCard(${i})">
    <span class="job-num-badge">#${i + 1}</span>
    <span class="job-card-title" id="job-card-title-${i}">${escHtml(title)}</span>
    <div class="job-card-actions" onclick="event.stopPropagation()">
      <button class="job-btn" onclick="moveJob(${i},-1)" ${i === 0 ? 'disabled' : ''} title="上移">↑</button>
      <button class="job-btn" onclick="moveJob(${i}, 1)" ${i === total - 1 ? 'disabled' : ''} title="下移">↓</button>
      <button class="job-btn job-btn-del" onclick="deleteJob(${i})" title="刪除此任務">✕</button>
    </div>
    <span class="job-card-chevron">${chevron}</span>
  </div>
  <div class="job-card-body">
    <div class="form-row">
      <label>自訂名稱（選填）</label>
      <input type="text" id="job-${i}-label" value="${escAttr(job.label || '')}"
             placeholder="例：爸爸-0622太魯閣" oninput="onJobTitleChange(${i})" />
    </div>
    <div class="form-row">
      <label>身分證字號</label>
      <input type="password" id="job-${i}-id_number" value="${escAttr(job.id_number || '')}"
             placeholder="A123456789" autocomplete="off" oninput="onJobTitleChange(${i})" />
    </div>
    <div class="form-row">
      <label>出發站</label>
      <select id="job-${i}-departure_station">${stationOptions(job.departure_station || '')}</select>
    </div>
    <div class="form-row">
      <label>抵達站</label>
      <select id="job-${i}-arrival_station">${stationOptions(job.arrival_station || '')}</select>
    </div>
    <div class="form-row">
      <label>乘車日期</label>
      <input type="date" id="job-${i}-date" value="${escAttr(dateForInput(job.date || ''))}" />
    </div>
    <div class="form-row">
      <label>車次號碼</label>
      <input type="text" id="job-${i}-train_number" value="${escAttr(String(job.train_number || ''))}"
             placeholder="例：283" oninput="onJobTitleChange(${i})" />
    </div>
    <div class="form-row">
      <label>票數（1-10）</label>
      <div class="num-wrapper">
        <button class="num-btn num-btn-dec" type="button" onclick="stepNum('job-${i}-ticket_count',-1)">−</button>
        <input type="number" id="job-${i}-ticket_count" min="1" max="10" value="${job.ticket_count ?? 1}" />
        <button class="num-btn num-btn-inc" type="button" onclick="stepNum('job-${i}-ticket_count', 1)">+</button>
      </div>
    </div>
    <div class="form-row">
      <label>座位偏好</label>
      <div class="radio-group">${seatRadios(i, job.seat_preference)}</div>
    </div>
    <div class="toggle-row">
      <div>
        <div class="label-text">接受換座</div>
        <div class="label-sub">接受同班車不同座位</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="job-${i}-accept_seat_exchange" ${job.accept_seat_exchange !== false ? 'checked' : ''} />
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>
</div>`.trim();
}

function renderJobs() {
  document.getElementById('job-list').innerHTML =
    jobs.map((job, i) => renderJobCard(job, i, jobs.length)).join('');
}

function syncJobsFromDOM() {
  const count = document.querySelectorAll('.job-card').length;
  jobs = Array.from({ length: count }, (_, i) => readJobFromCard(i));
}

function readJobFromCard(i) {
  return {
    label:                document.getElementById(`job-${i}-label`)?.value ?? '',
    id_number:            document.getElementById(`job-${i}-id_number`)?.value ?? '',
    departure_station:    document.getElementById(`job-${i}-departure_station`)?.value ?? '',
    arrival_station:      document.getElementById(`job-${i}-arrival_station`)?.value ?? '',
    date:                 document.getElementById(`job-${i}-date`)?.value ?? '',
    train_number:         document.getElementById(`job-${i}-train_number`)?.value ?? '',
    ticket_count:         parseInt(document.getElementById(`job-${i}-ticket_count`)?.value) || 1,
    seat_preference:      document.querySelector(`input[name="seat_pref_${i}"]:checked`)?.value ?? 'none',
    accept_seat_exchange: document.getElementById(`job-${i}-accept_seat_exchange`)?.checked ?? true,
  };
}

function toggleCard(i) {
  const card    = document.getElementById(`job-card-${i}`);
  const chevron = card?.querySelector('.job-card-chevron');
  if (!card) return;
  const wasCollapsed = card.classList.contains('collapsed');
  card.classList.toggle('collapsed');
  if (chevron) chevron.textContent = wasCollapsed ? '▲' : '▼';
}

function onJobTitleChange(i) {
  const label = document.getElementById(`job-${i}-label`)?.value?.trim() || '';
  const train = document.getElementById(`job-${i}-train_number`)?.value?.trim() || '—';
  const id    = document.getElementById(`job-${i}-id_number`)?.value?.trim() || '';
  const title = label || `Train ${train} — ${id ? id.substring(0, 3) + '***' : '—'}`;
  const el = document.getElementById(`job-card-title-${i}`);
  if (el) el.textContent = title;
}

function addJob() {
  syncJobsFromDOM();
  const template = jobs.length > 0 ? { ...jobs[jobs.length - 1] } : defaultJob();
  template.label = '';
  jobs.push(template);
  renderJobs();
  // collapse all other cards
  for (let i = 0; i < jobs.length - 1; i++) {
    const card = document.getElementById(`job-card-${i}`);
    const chev = card?.querySelector('.job-card-chevron');
    if (card && !card.classList.contains('collapsed')) {
      card.classList.add('collapsed');
      if (chev) chev.textContent = '▼';
    }
  }
  // expand the new card (renderJobCard collapses all cards with i > 0)
  const newIdx = jobs.length - 1;
  const newCard = document.getElementById(`job-card-${newIdx}`);
  const newChev = newCard?.querySelector('.job-card-chevron');
  if (newCard) {
    newCard.classList.remove('collapsed');
    if (newChev) newChev.textContent = '▲';
  }
  newCard?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function deleteJob(i) {
  if (document.querySelectorAll('.job-card').length <= 1) {
    showToast('至少需要一個搶票任務', 'err');
    return;
  }
  syncJobsFromDOM();
  jobs.splice(i, 1);
  renderJobs();
}

function moveJob(i, dir) {
  syncJobsFromDOM();
  const j = i + dir;
  if (j < 0 || j >= jobs.length) return;
  [jobs[i], jobs[j]] = [jobs[j], jobs[i]];
  renderJobs();
  // expand the card that received focus after moving
  const card = document.getElementById(`job-card-${j}`);
  const chev = card?.querySelector('.job-card-chevron');
  if (card && card.classList.contains('collapsed')) {
    card.classList.remove('collapsed');
    if (chev) chev.textContent = '▲';
  }
}

// ── 載入設定 ──────────────────────────────────────────────────────────
async function loadConfig() {
  try {
    const res = await fetch('/api/config');
    if (!res.ok) return;
    const data = await res.json();

    const rawJobs = Array.isArray(data.jobs) && data.jobs.length > 0
      ? data.jobs : [defaultJob()];
    jobs = rawJobs;
    renderJobs();

    const a = data.automation || {};
    setSelect('on_job_exhaust', a.on_job_exhaust || 'skip');
    setVal('retry_interval', a.retry_interval ?? 2);
    setVal('max_retries',    a.max_retries    ?? 1000);
    setVal('slow_mo',        a.slow_mo        ?? 100);
    setCheck('use_real_chrome', a.use_real_chrome !== false);
  } catch(e) {
    console.warn('loadConfig error', e);
    jobs = [defaultJob()];
    renderJobs();
  }
}

// ── 儲存設定 ──────────────────────────────────────────────────────────
async function saveConfig() {
  syncJobsFromDOM();

  const jobList = [];
  for (let i = 0; i < jobs.length; i++) {
    const job   = jobs[i];
    const idNum = (job.id_number || '').trim();
    const dep   = job.departure_station || '';
    const arr   = job.arrival_station   || '';
    const date  = job.date || '';
    const train = (job.train_number || '').trim();

    if (!idNum)      { showToast(`任務 ${i+1}：請填寫身分證字號`, 'err'); return false; }
    if (!dep)        { showToast(`任務 ${i+1}：請選擇出發站`,     'err'); return false; }
    if (!arr)        { showToast(`任務 ${i+1}：請選擇抵達站`,     'err'); return false; }
    if (dep === arr) { showToast(`任務 ${i+1}：出發站與抵達站不可相同`, 'err'); return false; }
    if (!date)       { showToast(`任務 ${i+1}：請選擇乘車日期`,   'err'); return false; }
    if (!train)      { showToast(`任務 ${i+1}：請填寫車次號碼`,   'err'); return false; }

    jobList.push({
      label:                job.label || '',
      id_number:            idNum,
      departure_station:    dep,
      arrival_station:      arr,
      date:                 date.replace(/-/g, '/'),
      train_number:         train,
      ticket_count:         job.ticket_count || 1,
      seat_preference:      job.seat_preference || 'none',
      accept_seat_exchange: job.accept_seat_exchange !== false,
    });
  }

  const payload = {
    jobs: jobList,
    automation: {
      headless:             false,
      on_job_exhaust:       getVal('on_job_exhaust') || 'skip',
      retry_interval:       parseFloat(getVal('retry_interval')) || 2,
      max_retries:          parseInt(getVal('max_retries'))       || 1000,
      slow_mo:              parseInt(getVal('slow_mo'))           || 100,
      use_real_chrome:      getCheck('use_real_chrome'),
      chrome_profile_path:  '',
      kill_chrome_on_start: false,
      collect_captcha:      false,
      captcha_dataset_dir:  'captcha_dataset',
    },
  };

  try {
    const res = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (res.ok) {
      showToast('✅ 設定已儲存', 'ok');
      return true;
    } else {
      const err = await res.json();
      showToast('儲存失敗：' + (err.detail || res.status), 'err');
      return false;
    }
  } catch(e) {
    showToast('網路錯誤：' + e.message, 'err');
    return false;
  }
}

// ── 排程 ──────────────────────────────────────────────────────────────
function toggleSchedule() {
  const enabled = getCheck('schedule_enabled');
  document.getElementById('schedule_time_row').style.display = enabled ? '' : 'none';
  if (enabled && !getVal('scheduled_time')) {
    const d = new Date();
    d.setDate(d.getDate() + 1);
    d.setHours(8, 0, 0, 0);
    const pad = n => String(n).padStart(2, '0');
    setVal('scheduled_time',
      `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`
    );
  }
}

// ── 開始 / 停止 ───────────────────────────────────────────────────────
let _notifiedSuccess = false;

async function startBooking() {
  const saved = await saveConfig();
  if (!saved) return;

  _notifiedSuccess = false;

  const body = {};
  if (getCheck('schedule_enabled')) {
    const st = getVal('scheduled_time');
    if (!st) { showToast('請選擇排程開始時間', 'err'); return; }
    if (new Date(st) <= new Date()) { showToast('排程時間必須是未來時間', 'err'); return; }
    body.scheduled_time = st;
  }

  try {
    const res = await fetch('/api/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (res.ok) {
      showToast(body.scheduled_time ? '⏰ 排程已設定' : '▶ 搶票已啟動', 'ok');
      pollStatus();
    } else {
      const err = await res.json();
      showToast('啟動失敗：' + (err.detail || res.status), 'err');
    }
  } catch(e) {
    showToast('網路錯誤：' + e.message, 'err');
  }
}

async function stopBooking() {
  try {
    await fetch('/api/stop', { method: 'POST' });
    pollStatus();
    showToast('⏹ 已停止', 'ok');
  } catch(e) {
    showToast('停止失敗：' + e.message, 'err');
  }
}

// ── 輪詢狀態（每 1 秒）────────────────────────────────────────────────
let _prevState  = 'idle';
let _lastJobLabel = '';

async function pollStatus() {
  try {
    const res = await fetch('/api/status');
    if (!res.ok) return;
    const { state, countdown_secs, retry_count,
            job_index, total_jobs, current_job_label, job_results } = await res.json();

    const dot      = document.getElementById('status-dot');
    const text     = document.getElementById('status-text');
    const startBtn = document.getElementById('btn-start');
    const stopBtn  = document.getElementById('btn-stop');

    dot.className = 'status-dot ' + state;

    const jobInfo  = (total_jobs > 1) ? ` — 第 ${job_index + 1}/${total_jobs}` : '';
    const retryInfo = retry_count > 0 ? `（第 ${retry_count} 次）` : '';

    if (state === 'waiting') {
      const h = Math.floor(countdown_secs / 3600);
      const m = Math.floor((countdown_secs % 3600) / 60);
      const s = countdown_secs % 60;
      const pad = n => String(n).padStart(2, '0');
      text.textContent = `⏰ 倒數 ${pad(h)}:${pad(m)}:${pad(s)}${jobInfo}`;
    } else if (state === 'running') {
      text.textContent = (`執行中${jobInfo} ${retryInfo}`).trim();
    } else if (state === 'success') {
      text.textContent = '搶票成功 🎉';
      if (_prevState !== 'success' && !_notifiedSuccess) {
        _notifiedSuccess = true;
        triggerNotification(current_job_label || _lastJobLabel);
      }
    } else if (state === 'failed') {
      text.textContent = '搶票失敗';
    } else {
      text.textContent = '閒置';
    }

    if (current_job_label) _lastJobLabel = current_job_label;
    _prevState = state;

    // Job results strip（多 job 時才顯示）
    const strip = document.getElementById('job-results-strip');
    if (Array.isArray(job_results) && job_results.length > 1) {
      strip.style.display = 'flex';
      strip.innerHTML = job_results.map((r, i) => {
        let icon = '⬜';
        if      (r === 'success') icon = '✅';
        else if (r === 'failed')  icon = '❌';
        else if (i === job_index && (state === 'running' || state === 'waiting')) icon = '⏳';
        return `<span title="任務 ${i + 1}">${icon}</span>`;
      }).join('');
    } else {
      strip.style.display = 'none';
      strip.innerHTML = '';
    }

    const busy = (state === 'running' || state === 'waiting');
    startBtn.disabled = busy;
    stopBtn.disabled  = !busy;
  } catch(e) {}
}
setInterval(pollStatus, 1000);

// ── 桌面通知（Notification API）──────────────────────────────────────
function triggerNotification(jobLabel) {
  if (!('Notification' in window)) return;
  const send = () => {
    try {
      const body = jobLabel
        ? `${jobLabel} 訂票成功！請前往確認訂單並完成付款。`
        : '台鐵票已搶到，請前往確認訂單並完成付款。';
      new Notification('🎉 搶票成功！', { body });
    } catch(e) {}
  };
  if (Notification.permission === 'granted') {
    send();
  } else if (Notification.permission !== 'denied') {
    Notification.requestPermission().then(p => { if (p === 'granted') send(); });
  }
}

function requestNotificationPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

// ── WebSocket Log ─────────────────────────────────────────────────────
let ws = null;
let autoScroll = true;

function connectWS() {
  const wsUrl = `ws://${location.host}/ws/logs`;
  ws = new WebSocket(wsUrl);
  const dot = document.getElementById('ws-dot');

  ws.onopen  = () => { dot.className = 'ws-indicator connected'; };
  ws.onclose = () => {
    dot.className = 'ws-indicator';
    setTimeout(connectWS, 3000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = (evt) => {
    appendLog(evt.data);
    if (ws.readyState === WebSocket.OPEN) ws.send('ping');
  };
}

function appendLog(raw) {
  const out = document.getElementById('log-output');

  if (raw.includes('搶票成功') || raw.includes('🎉')) {
    const banner = document.createElement('div');
    banner.className = 'log-success-banner';
    banner.textContent = '🎉 搶票成功！';
    out.appendChild(banner);
  }

  const match = raw.match(/^(\d{2}:\d{2}:\d{2})\s+\[(\w+)\]\s+([\s\S]*)$/);
  const line  = document.createElement('div');
  if (match) {
    const [, ts, lv, msg] = match;
    line.className = `log-line ${lv}`;
    line.innerHTML =
      `<span class="ts">${ts}</span>` +
      `<span class="lv">${lv}</span>` +
      `<span class="msg">${escHtml(msg)}</span>`;
  } else {
    line.className = 'log-line INFO';
    line.innerHTML = `<span class="msg">${escHtml(raw)}</span>`;
  }
  out.appendChild(line);

  while (out.children.length > 500) out.removeChild(out.firstChild);
  if (autoScroll) out.scrollTop = out.scrollHeight;
}

// ── Log 工具 ─────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('log-output').addEventListener('scroll', function() {
    autoScroll = (this.scrollHeight - this.scrollTop - this.clientHeight) < 40;
  });
});

function clearLog() {
  document.getElementById('log-output').innerHTML = '';
}

function copyLog() {
  const lines = [...document.getElementById('log-output').querySelectorAll('.log-line')];
  const text  = lines.map(l => l.textContent.trim()).join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('Log 已複製', 'ok'));
}

// ── Toast ─────────────────────────────────────────────────────────────
let _toastTimer = null;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, 2500);
}

// ── 初始化 ────────────────────────────────────────────────────────────
loadConfig();
connectWS();
requestNotificationPermission();
</script>
