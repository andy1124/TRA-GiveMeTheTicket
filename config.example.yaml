# =========================================
# 台鐵自動訂票設定檔 — 範例
# 複製此檔為 config.yaml 並填入你的資料
# =========================================

# ─────────────────────────────────────────────────────────────────────────────
# 【新格式】多工搶票列表（推薦使用）
#
# 使用 jobs: 可依序搶多個車次 / 多人的票，全程共用同一個 Chrome 瀏覽器。
# 程式會從 Job 1 開始，搶到（或耗盡 max_retries）後自動繼續 Job 2，以此類推。
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  - label: "爸爸-0622太魯閣"     # 自訂名稱（選填，顯示於 log 與 UI 狀態列）
    id_number: "A123456789"      # 身分證字號
    departure_station: "台北"    # 出發站（填中文站名，例如：台北、新竹、台中）
    arrival_station: "台中"      # 抵達站
    date: "2026/06/22"           # 乘車日期，格式：YYYY/MM/DD
    train_number: "102"          # 車次號碼
    ticket_count: 1              # 一般座票數

    # 座位偏好：
    #   "none"   → 不指定（預設）
    #   "window" → 靠窗
    #   "aisle"  → 靠走道
    #   "table"  → 桌型座優先
    seat_preference: "window"

    # 是否接受同班車換座
    accept_seat_exchange: true

  - label: "媽媽-0622太魯閣"
    id_number: "B987654321"
    departure_station: "台北"
    arrival_station: "台中"
    date: "2026/06/22"
    train_number: "102"
    ticket_count: 1
    seat_preference: "window"
    accept_seat_exchange: true

# ─────────────────────────────────────────────────────────────────────────────
# 【舊格式】向後相容（若 config.yaml 沒有 jobs: 鍵，程式自動改用此單筆設定）
#
# 只搶一張票的話可以直接沿用此格式，不需改成 jobs: 列表。
# ─────────────────────────────────────────────────────────────────────────────
booking:
  id_number: "A123456789"
  departure_station: "台北"
  arrival_station: "台中"
  date: "2026/06/01"
  train_number: "139"
  ticket_count: 1
  seat_preference: "window"
  accept_seat_exchange: true

# ─────────────────────────────────────────────────────────────────────────────
# 全域自動化設定（套用到所有 jobs）
# ─────────────────────────────────────────────────────────────────────────────
automation:
  headless: false          # false = 看得到瀏覽器（建議調試時用 false）
  retry_interval: 3        # 刷票失敗後的等待秒數
  max_retries: 200         # 最大重試次數（每個 job 各自計算）
  slow_mo: 300             # 每個操作之間的延遲毫秒（0 = 最快）

  # 單一 job 耗盡 max_retries 仍失敗時的行為：
  #   skip（預設）：略過此 job，繼續執行下一個
  #   stop：整個程式立即停止
  on_job_exhaust: skip

  # true = 使用你電腦上安裝的真實 Chrome（避免 reCAPTCHA v3 驗證碼）
  # false = 使用 Playwright 內建 Chromium（可能觸發驗證碼）
  use_real_chrome: true

  # 【強烈建議填寫】指定真實 Chrome 使用者資料目錄，讓 reCAPTCHA v3 直接信任你的帳號。
  # 填寫後幾乎不會再出現驗證碼。
  # 注意：執行本工具前必須先完全關閉 Chrome（含背景執行）。
  #
  # Windows 預設路徑範例：
  #   chrome_profile_path: "C:\\Users\\你的使用者名稱\\AppData\\Local\\Google\\Chrome\\User Data"
  # macOS 預設路徑範例：
  #   chrome_profile_path: "/Users/你的使用者名稱/Library/Application Support/Google/Chrome"
  #
  # 留空 = 使用專案目錄下的 .chrome_profile/（全新空白 profile，初次執行仍可能出現驗證碼）
  chrome_profile_path: ""

  # true = 執行前自動強制關閉所有 Chrome 視窗（使用 chrome_profile_path 時建議開啟）
  # false = 不自動關閉，若 Chrome 仍在執行則會出錯並提示手動關閉
  kill_chrome_on_start: false

  # ── 驗證碼蒐集模式（Phase 1：訓練資料蒐集）─────────────────────
  #
  # collect_captcha: true 時，每次 ddddocr 預測後會依訂票結果分類存圖：
  #
  #   captcha_dataset/
  #   ├── labeled/    ← 伺服器接受（captcha 答對）→ 可直接用於模型訓練
  #   │               │  檔名格式：{預測文字}_{timestamp}.png
  #   │               │  例：aB3kL9_1716876543.png（檔名即正確 label）
  #   ├── errors/     ← 伺服器拒絕（captcha 答錯）→ 需人工重新標記
  #   │               │  檔名格式：{timestamp}_{ddddocr猜測}.png
  #   └── uncertain/  ← 結果不明（unknown）
  #
  # 也可以用 CLI 旗標臨時開啟，不需修改 config.yaml：
  #   python main.py --collect-captcha
  #
  collect_captcha: false

  # 蒐集資料的存放根目錄（相對於專案根目錄）
  captcha_dataset_dir: "captcha_dataset"
